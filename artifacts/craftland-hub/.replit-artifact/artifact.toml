kind = "web"
previewPath = "/"
title = "CraftLand Hub"
version = "1.0.0"
id = "artifacts/craftland-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18288

[services.development]
run = "pnpm --filter @workspace/craftland-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/craftland-hub", "run", "build" ]
publicDir = "artifacts/craftland-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18288"
BASE_PATH = "/"
